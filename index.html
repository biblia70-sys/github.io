<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大堰校区 未来づくりアイデア検索（スマホ対応版）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Yマート&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f0f9ff; color: #334155; -webkit-tap-highlight-color: transparent; }
        .card { transition: transform 0.2s, box-shadow 0.2s; touch-action: manipulation; }
        .card:active { transform: scale(0.98); }
        @media (min-width: 768px) {
            .card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        }
        .category-btn.active { background-color: #00897b; color: white; border-color: #00897b; box-shadow: 0 2px 4px rgba(0,137,123,0.3); }
        .hero-bg { background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%); }
        
        /* Custom Scrollbar for horizontal scroll */
        .horizontal-scroll::-webkit-scrollbar { height: 4px; }
        .horizontal-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease forwards; }
        
        /* Stock Animation */
        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }
        .heart-active { color: #ef4444; animation: heartBeat 0.3s ease-in-out; }

        /* Gacha Animation */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
        .gacha-item { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-24">

    <!-- Header -->
    <header class="bg-white/95 backdrop-blur-md shadow-sm sticky top-0 z-30 border-b border-slate-100 safe-area-top">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="resetSearch()">
                <div class="w-8 h-8 bg-teal-600 rounded-lg flex items-center justify-center text-white shadow-sm flex-shrink-0">
                    <i class="fa-solid fa-leaf"></i>
                </div>
                <h1 class="text-lg font-bold text-slate-800 leading-tight truncate">
                    大堰校区<span class="hidden xs:inline">アイデア</span><br><span class="text-[10px] text-slate-500 font-normal block -mt-1">未来づくり300選</span>
                </h1>
            </div>
            <div class="flex gap-2">
                <button onclick="showGachaModal()" class="bg-yellow-400 hover:bg-yellow-500 text-white font-bold py-1.5 px-3 rounded-full shadow-md transition active:scale-95 text-xs flex flex-col items-center justify-center leading-none min-w-[50px]">
                    <i class="fa-solid fa-gift text-base mb-0.5"></i>
                    <span>ガチャ</span>
                </button>
                <button onclick="toggleStockDrawer()" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-1.5 px-3 rounded-full shadow-md transition active:scale-95 text-xs flex flex-col items-center justify-center leading-none relative min-w-[50px]">
                    <i class="fa-solid fa-heart text-base mb-0.5"></i>
                    <span>保存</span>
                    <span id="stockCountBadge" class="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] font-bold w-4 h-4 flex items-center justify-center rounded-full hidden shadow-sm border border-white">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <div class="hero-bg py-6 px-4 text-center relative">
        <div class="relative z-10 max-w-2xl mx-auto">
            <h2 class="text-xl md:text-3xl font-bold text-slate-800 mb-2">
                300の「あったらいいな」
            </h2>
            <p class="text-slate-600 mb-5 text-xs md:text-sm">
                大堰校区の課題を解決するアイデア集。<br>
                キーワードやカテゴリで検索してみましょう。
            </p>
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
                </div>
                <input type="text" id="searchInput" placeholder="キーワード検索（例：ホタル、子供...）" 
                       class="w-full pl-11 pr-4 py-3 rounded-full border-2 border-slate-200 focus:border-teal-500 outline-none shadow-sm text-base transition duration-200 bg-white/90 focus:bg-white appearance-none">
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-4 relative z-0">
        
        <!-- Category Filters (Horizontal Scroll on Mobile) -->
        <div class="mb-6">
            <div class="flex items-center justify-between mb-2 px-1">
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider flex items-center">
                    <i class="fa-solid fa-filter mr-1"></i>カテゴリ
                </h3>
                <span class="text-[10px] text-slate-400 md:hidden">横にスワイプ <i class="fa-solid fa-arrow-right-long"></i></span>
            </div>
            <div class="overflow-x-auto horizontal-scroll pb-2 -mx-4 px-4 md:mx-0 md:px-0">
                <div class="flex flex-nowrap md:flex-wrap gap-2 min-w-max md:min-w-0" id="categoryFilters">
                    <button class="category-btn active border border-slate-200 bg-white text-slate-600 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap" data-category="all">すべて</button>
                    <button class="category-btn border border-slate-200 bg-white text-slate-600 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap" data-category="防災・安全"><i class="fa-solid fa-shield-halved mr-1 text-red-400"></i>防災・安全</button>
                    <button class="category-btn border border-slate-200 bg-white text-slate-600 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap" data-category="生活・交通"><i class="fa-solid fa-bus mr-1 text-blue-400"></i>生活・交通</button>
                    <button class="category-btn border border-slate-200 bg-white text-slate-600 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap" data-category="コミュニティ"><i class="fa-solid fa-people-group mr-1 text-orange-400"></i>コミュニティ</button>
                    <button class="category-btn border border-slate-200 bg-white text-slate-600 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap" data-category="産業・農業"><i class="fa-solid fa-wheat-awn mr-1 text-green-400"></i>産業・農業</button>
                    <button class="category-btn border border-slate-200 bg-white text-slate-600 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap" data-category="子育て・若者"><i class="fa-solid fa-children mr-1 text-pink-400"></i>子育て</button>
                    <button class="category-btn border border-slate-200 bg-white text-slate-600 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap" data-category="自然・環境"><i class="fa-solid fa-tree mr-1 text-emerald-400"></i>自然・環境</button>
                    <button class="category-btn border border-slate-200 bg-white text-slate-600 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap" data-category="歴史・文化"><i class="fa-solid fa-landmark mr-1 text-purple-400"></i>歴史・文化</button>
                    <button class="category-btn border border-slate-200 bg-white text-slate-600 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap" data-category="健康"><i class="fa-solid fa-heart-pulse mr-1 text-cyan-400"></i>健康</button>
                    <button class="category-btn border border-slate-200 bg-white text-slate-600 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap" data-category="その他"><i class="fa-solid fa-plus mr-1 text-gray-400"></i>その他</button>
                </div>
            </div>
        </div>

        <!-- Results Info -->
        <div class="flex justify-between items-end mb-4 border-b border-slate-200 pb-2">
            <p class="text-slate-500 text-xs md:text-sm">
                <span id="resultCount" class="font-bold text-slate-800 text-lg md:text-2xl mr-1">300</span> 件
            </p>
        </div>

        <!-- Cards Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="ideasGrid">
            <!-- Cards will be injected here by JS -->
        </div>

        <!-- No Results Message -->
        <div id="noResults" class="hidden flex flex-col items-center justify-center py-12 text-center">
            <div class="bg-slate-100 p-5 rounded-full mb-3">
                <i class="fa-solid fa-magnifying-glass text-3xl text-slate-300"></i>
            </div>
            <h3 class="text-base font-bold text-slate-700 mb-1">見つかりませんでした</h3>
            <button onclick="resetSearch()" class="text-teal-600 font-medium text-sm underline p-2">
                すべてのアイデアを表示
            </button>
        </div>
    </main>

    <!-- Stock Drawer (Bottom Sheet) -->
    <div id="stockDrawer" class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-5px_20px_rgba(0,0,0,0.15)] transform translate-y-full transition-transform duration-300 z-40 rounded-t-2xl border-t border-slate-100 flex flex-col safe-area-bottom" style="height: 60vh;">
        <!-- Drag Handle for mobile visual cue -->
        <div class="w-full flex justify-center pt-3 pb-1" onclick="toggleStockDrawer()">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full"></div>
        </div>
        
        <div class="px-4 pb-2 border-b border-slate-100 flex justify-between items-center bg-white">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-heart text-pink-500 text-lg"></i>
                <h3 class="font-bold text-slate-800 text-sm">ストック (<span id="drawerCount">0</span>)</h3>
            </div>
            <div class="flex gap-2">
                <button onclick="clearStock()" class="text-xs text-slate-400 hover:text-red-500 px-2 py-1">全消去</button>
                <button onclick="toggleStockDrawer()" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 active:bg-slate-200">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </div>
        <div id="stockList" class="p-4 overflow-y-auto flex-grow grid grid-cols-1 sm:grid-cols-2 gap-3 bg-slate-50 content-start">
            <!-- Stocked items go here -->
        </div>
    </div>

    <!-- Gacha Modal -->
    <div id="gachaModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="closeGachaModal()"></div>
        
        <!-- Modal Content -->
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[85vh] overflow-hidden flex flex-col relative z-10">
            <!-- Gacha Header -->
            <div class="bg-gradient-to-r from-yellow-400 to-orange-400 p-5 text-center text-white relative">
                <i class="fa-solid fa-star absolute top-2 left-4 text-yellow-300 opacity-50 text-3xl animate-pulse"></i>
                <h2 class="text-2xl font-bold mb-1 relative z-10 drop-shadow-md">アイデアガチャ</h2>
                <button onclick="closeGachaModal()" class="absolute top-3 right-3 text-white/80 hover:text-white w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/20 transition z-20">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <!-- Gacha Content -->
            <div class="p-5 flex-grow overflow-y-auto bg-slate-50">
                <!-- Start Screen -->
                <div id="gachaStart" class="text-center py-6">
                    <div class="text-7xl mb-6 animate-bounce">🎁</div>
                    <div class="flex flex-col gap-3">
                        <button onclick="playGacha(1)" class="bg-white border-2 border-slate-200 active:bg-slate-50 text-slate-600 font-bold py-3 px-6 rounded-xl shadow-sm flex items-center justify-center gap-2 w-full">
                            <span class="text-base">1回引く</span>
                        </button>
                        <button onclick="playGacha(5)" class="bg-gradient-to-r from-teal-500 to-teal-600 active:from-teal-600 active:to-teal-700 text-white font-bold py-4 px-6 rounded-xl shadow-md flex flex-col items-center justify-center w-full">
                            <span class="text-lg flex items-center gap-1"><i class="fa-solid fa-bolt text-yellow-300"></i> 5連ガチャ</span>
                        </button>
                    </div>
                </div>

                <!-- Result Screen -->
                <div id="gachaResult" class="hidden">
                    <div id="gachaItems" class="grid grid-cols-1 gap-3 mb-6">
                        <!-- Items injected here -->
                    </div>
                    <div class="text-center flex flex-col gap-3">
                        <button onclick="playGacha(5)" class="bg-teal-500 active:bg-teal-600 text-white font-bold py-3 px-8 rounded-full shadow w-full">
                            もう一度引く
                        </button>
                        <button onclick="resetGacha()" class="text-slate-400 active:text-slate-600 font-medium py-2 text-sm">
                            もどる
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Idea Detail Modal -->
    <div id="detailModal" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center sm:p-4">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" id="detailModalBackdrop" onclick="closeDetailModal()"></div>
        
        <!-- Modal Content (Bottom sheet on mobile, Center modal on desktop) -->
        <div class="bg-white rounded-t-2xl sm:rounded-2xl shadow-2xl w-full max-w-lg transform transition-transform duration-300 translate-y-full sm:translate-y-0 scale-100 flex flex-col max-h-[90vh] relative z-10" id="detailModalPanel">
            
            <!-- Mobile Drag Handle -->
            <div class="sm:hidden w-full flex justify-center pt-3 pb-1 bg-slate-50 rounded-t-2xl" onclick="closeDetailModal()">
                <div class="w-12 h-1.5 bg-slate-200 rounded-full"></div>
            </div>

            <div class="relative bg-slate-50 px-5 pb-4 sm:pt-5 sm:rounded-t-2xl border-b border-slate-100">
                <button onclick="closeDetailModal()" class="absolute top-3 right-3 w-8 h-8 flex items-center justify-center rounded-full bg-white text-slate-400 active:bg-slate-200 shadow-sm hidden sm:flex">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <div class="flex flex-col items-center text-center pt-1">
                    <span id="modalCategoryBadge" class="inline-flex items-center px-3 py-0.5 rounded-full text-[10px] font-bold mb-2 bg-teal-100 text-teal-700">カテゴリ</span>
                    <h2 id="modalTitle" class="text-xl font-bold text-slate-800 leading-tight mb-1">タイトル</h2>
                    <div class="flex items-center gap-2 text-xs text-slate-500">
                        <span class="px-2 py-0.5 bg-slate-100 rounded border border-slate-200 font-mono">No.<span id="modalId">00</span></span>
                        <span>型：<span id="modalType" class="font-medium text-slate-700"></span></span>
                    </div>
                </div>
            </div>
            <div class="p-5 overflow-y-auto">
                <div class="mb-5">
                    <div class="text-slate-400 text-[10px] font-bold uppercase tracking-wider mb-1"><i class="fa-solid fa-circle-exclamation"></i> 解決する課題</div>
                    <p id="modalTask" class="text-slate-700 font-medium bg-red-50 p-3 rounded-lg border-l-4 border-red-300 text-sm"></p>
                </div>
                <div class="mb-5">
                    <div class="text-teal-600 text-[10px] font-bold uppercase tracking-wider mb-1"><i class="fa-regular fa-lightbulb text-base"></i> アイデア詳細</div>
                    <p id="modalDetail" class="text-base text-slate-800 leading-relaxed"></p>
                </div>
            </div>
            <div class="p-4 border-t border-slate-100 bg-slate-50 safe-area-bottom rounded-b-none sm:rounded-b-2xl flex justify-center">
                <button id="modalStockBtn" class="w-full sm:w-auto border-2 border-pink-400 text-pink-500 active:bg-pink-50 font-bold py-3 sm:py-2 px-8 rounded-full transition flex items-center justify-center gap-2" onclick="toggleStockFromModal()">
                    <i class="fa-regular fa-heart"></i> ストックする
                </button>
            </div>
        </div>
    </div>

        // データをオブジェクト配列に変換
        const ideas = rawData.map(item => ({
            id: item[0],
            category: item[1],
            task: item[2],
            type: item[3],
            title: item[4],
            detail: item[5]
        }));
        
        // --- ストック機能のロジック ---
        let stockedIdeas = JSON.parse(localStorage.getItem('stockedIdeas') || '[]');

        function toggleStock(id) {
            const index = stockedIdeas.indexOf(id);
            if (index === -1) {
                stockedIdeas.push(id);
            } else {
                stockedIdeas.splice(index, 1);
            }
            localStorage.setItem('stockedIdeas', JSON.stringify(stockedIdeas));
            updateStockUI();
        }
        
        function updateStockUI() {
            const count = stockedIdeas.length;
            const badge = document.getElementById('stockCountBadge');
            const drawerCount = document.getElementById('drawerCount');
            
            if (badge) {
                if (count > 0) {
                    badge.textContent = count;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            }
            if (drawerCount) drawerCount.textContent = count;
            
            // Update heart icons in grid
            document.querySelectorAll('.stock-btn i').forEach(icon => {
                const card = icon.closest('.card');
                if (card && card.dataset.id) {
                    const id = parseInt(card.dataset.id);
                    if (stockedIdeas.includes(id)) {
                        icon.className = 'fa-solid fa-heart text-pink-500 heart-active';
                    } else {
                        icon.className = 'fa-regular fa-heart text-slate-300';
                    }
                }
            });

            // Update drawer content
            renderStockDrawer();
        }
        
        function renderStockDrawer() {
            const list = document.getElementById('stockList');
            if (!list) return;
            
            if (stockedIdeas.length === 0) {
                list.innerHTML = '<p class="text-slate-400 text-center w-full py-8 col-span-full">まだストックされたアイデアはありません。<br>ハートマークを押してアイデアを集めましょう！</p>';
                return;
            }
            
            list.innerHTML = '';
            stockedIdeas.forEach(id => {
                const idea = ideas.find(i => i.id === id);
                if (!idea) return;
                
                const card = document.createElement('div');
                card.className = 'bg-white p-3 rounded-lg border border-slate-100 shadow-sm flex justify-between items-center';
                card.innerHTML = `
                    <div class="overflow-hidden cursor-pointer" onclick="openModalId(${idea.id})">
                        <div class="text-xs text-teal-600 font-bold mb-1 line-clamp-1">${idea.category}</div>
                        <div class="font-bold text-slate-800 text-sm line-clamp-1">${idea.title}</div>
                    </div>
                    <button onclick="toggleStock(${idea.id})" class="text-pink-500 hover:text-pink-600 p-2">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                `;
                list.appendChild(card);
            });
        }
        
        function toggleStockDrawer() {
            const drawer = document.getElementById('stockDrawer');
            if (drawer) {
                if (drawer.classList.contains('translate-y-full')) {
                    drawer.classList.remove('translate-y-full');
                    // Close gacha modal if open
                    closeGachaModal();
                } else {
                    drawer.classList.add('translate-y-full');
                }
            }
        }
        
        function clearStock() {
            if(confirm('ストックを全て削除しますか？')) {
                stockedIdeas = [];
                localStorage.setItem('stockedIdeas', JSON.stringify(stockedIdeas));
                updateStockUI();
            }
        }

        function toggleStockFromModal() {
            const idElement = document.getElementById('modalId');
            if (!idElement) return;
            
            const id = parseInt(idElement.textContent);
            toggleStock(id);
            
            const btn = document.getElementById('modalStockBtn');
            if (btn) {
                if (stockedIdeas.includes(id)) {
                    btn.innerHTML = '<i class="fa-solid fa-heart"></i> ストック済み';
                    btn.className = "w-full sm:w-auto bg-pink-500 text-white font-bold py-3 sm:py-2 px-8 rounded-full transition flex items-center justify-center gap-2 hover:bg-pink-600";
                } else {
                    btn.innerHTML = '<i class="fa-regular fa-heart"></i> ストックする';
                    btn.className = "w-full sm:w-auto border-2 border-pink-400 text-pink-500 hover:bg-pink-50 font-bold py-3 sm:py-2 px-8 rounded-full transition flex items-center justify-center gap-2";
                }
            }
        }
        
        function openModalId(id) {
            // Close drawer on mobile if open
            const drawer = document.getElementById('stockDrawer');
            if(drawer && !drawer.classList.contains('translate-y-full')) {
                drawer.classList.add('translate-y-full');
            }
            
            const idea = ideas.find(i => i.id === id);
            if (idea) openModal(idea);
        }


        // --- ガチャ機能のロジック ---
        function showGachaModal() {
            const modal = document.getElementById('gachaModal');
            if(modal) {
                modal.classList.remove('hidden');
                document.getElementById('gachaStart').classList.remove('hidden');
                document.getElementById('gachaResult').classList.add('hidden');
                // Close drawer if open
                const drawer = document.getElementById('stockDrawer');
                if(drawer) drawer.classList.add('translate-y-full');
            }
        }
        
        function closeGachaModal() {
            const modal = document.getElementById('gachaModal');
            if(modal) modal.classList.add('hidden');
        }
        
        function resetGacha() {
            document.getElementById('gachaResult').classList.add('hidden');
            document.getElementById('gachaStart').classList.remove('hidden');
        }
        
        function playGacha(count) {
            const results = [];
            const tempIdeas = [...ideas]; 
            
            for (let i = 0; i < count; i++) {
                const randomIndex = Math.floor(Math.random() * tempIdeas.length);
                results.push(tempIdeas[randomIndex]);
            }
            
            const container = document.getElementById('gachaItems');
            container.innerHTML = '';
            
            results.forEach((idea, index) => {
                const colorClass = getCategoryColor(idea.category);
                const div = document.createElement('div');
                div.className = `bg-white p-4 rounded-xl shadow-md border-l-4 ${colorClass.replace('bg-', 'border-').split(' ')[0]} gacha-item relative`;
                div.style.animationDelay = `${index * 0.1}s`;
                
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="pr-8">
                            <span class="text-[10px] font-bold text-slate-400 mb-1 block">${idea.category} / ${idea.type}</span>
                            <h3 class="font-bold text-base text-slate-800">${idea.title}</h3>
                            <p class="text-xs text-slate-600 mt-1 line-clamp-2">${idea.detail}</p>
                        </div>
                        <button onclick="toggleStock(${idea.id}); this.innerHTML = stockedIdeas.includes(${idea.id}) ? '<i class=\'fa-solid fa-heart text-pink-500\'></i>' : '<i class=\'fa-regular fa-heart text-slate-300\'></i>'" class="p-2 absolute top-2 right-2">
                             ${stockedIdeas.includes(idea.id) ? '<i class="fa-solid fa-heart text-pink-500"></i>' : '<i class="fa-regular fa-heart text-slate-300"></i>'}
                        </button>
                    </div>
                    <div class="mt-2 text-right">
                         <button onclick="closeGachaModal(); openModalId(${idea.id})" class="text-xs text-teal-600 font-bold">詳細 <i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                `;
                container.appendChild(div);
            });
            
            document.getElementById('gachaStart').classList.add('hidden');
            document.getElementById('gachaResult').classList.remove('hidden');
        }


        // --- 基本機能のロジック ---

        // アイコン設定
        function getCategoryIcon(category) {
            const icons = {
                "防災・安全": "fa-shield-halved",
                "生活・交通": "fa-bus",
                "コミュニティ": "fa-people-group",
                "産業・農業": "fa-wheat-awn",
                "子育て・若者": "fa-children",
                "自然・環境": "fa-tree",
                "健康": "fa-heart-pulse",
                "歴史・文化": "fa-landmark",
                "その他": "fa-lightbulb"
            };
            return icons[category] || "fa-star";
        }

        // 色設定（Tailwindクラス）
        function getCategoryColor(category) {
            const colors = {
                "防災・安全": "bg-red-50 text-red-600 border-red-200",
                "生活・交通": "bg-blue-50 text-blue-600 border-blue-200",
                "コミュニティ": "bg-orange-50 text-orange-600 border-orange-200",
                "産業・農業": "bg-green-50 text-green-600 border-green-200",
                "子育て・若者": "bg-pink-50 text-pink-600 border-pink-200",
                "自然・環境": "bg-emerald-50 text-emerald-600 border-emerald-200",
                "健康": "bg-cyan-50 text-cyan-600 border-cyan-200",
                "歴史・文化": "bg-purple-50 text-purple-600 border-purple-200",
                "その他": "bg-slate-50 text-slate-600 border-slate-200"
            };
            return colors[category] || "bg-gray-50 text-gray-600 border-gray-200";
        }

        // カード描画
        function renderIdeas(data) {
            const grid = document.getElementById('ideasGrid');
            const resultCount = document.getElementById('resultCount');
            const noResults = document.getElementById('noResults');
            
            if(grid) grid.innerHTML = '';
            if(resultCount) resultCount.textContent = data.length;

            if (data.length === 0) {
                if(noResults) noResults.classList.remove('hidden');
            } else {
                if(noResults) noResults.classList.add('hidden');
                data.forEach((idea, index) => {
                    const delay = index < 12 ? index * 30 : 0;
                    const iconClass = getCategoryIcon(idea.category);
                    const colorClass = getCategoryColor(idea.category);
                    const isStocked = stockedIdeas.includes(idea.id);
                    
                    const card = document.createElement('div');
                    card.className = 'card bg-white rounded-2xl shadow-sm border border-slate-100 p-5 flex flex-col h-full cursor-pointer opacity-0 animate-fade-in relative group';
                    card.style.animation = `fadeIn 0.5s ease forwards ${delay}ms`;
                    card.dataset.id = idea.id;
                    
                    // Click event for card body only
                    card.addEventListener('click', (e) => {
                        if (!e.target.closest('.stock-btn')) {
                            openModal(idea);
                        }
                    });
                    
                    card.innerHTML = `
                        <button class="stock-btn absolute top-4 right-4 z-10 p-2 rounded-full hover:bg-slate-50 transition" onclick="toggleStock(${idea.id})">
                            <i class="${isStocked ? 'fa-solid fa-heart text-pink-500' : 'fa-regular fa-heart text-slate-300'} text-xl transition-colors"></i>
                        </button>
                        <div class="flex justify-between items-start mb-3 pr-8">
                            <span class="text-[10px] font-bold px-2 py-1 rounded-md border ${colorClass}">
                                <i class="fa-solid ${iconClass} mr-1"></i>${idea.category}
                            </span>
                        </div>
                        <h3 class="text-lg font-bold text-slate-800 mb-2 leading-snug">${idea.title}</h3>
                        <p class="text-slate-500 text-sm line-clamp-3 flex-grow leading-relaxed">${idea.detail}</p>
                        <div class="mt-4 pt-3 border-t border-slate-50 flex justify-between items-center text-xs text-slate-400">
                            <span class="flex items-center"><i class="fa-solid fa-wand-magic-sparkles mr-1 text-yellow-400"></i>${idea.type}</span>
                            <span class="text-teal-500 font-medium flex items-center group-hover:translate-x-1 transition-transform">詳細 <i class="fa-solid fa-chevron-right ml-1 text-[10px]"></i></span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
            updateStockUI(); // Ensure UI sync
        }

        // フィルタリングロジック
        let currentCategory = 'all';
        let currentSearch = '';

        function filterIdeas() {
            const filtered = ideas.filter(idea => {
                const matchCategory = currentCategory === 'all' || idea.category === currentCategory;
                const searchLower = currentSearch.toLowerCase();
                const matchSearch = idea.title.toLowerCase().includes(searchLower) || 
                                    idea.detail.toLowerCase().includes(searchLower) || 
                                    idea.category.toLowerCase().includes(searchLower) ||
                                    idea.task.toLowerCase().includes(searchLower);
                return matchCategory && matchSearch;
            });
            renderIdeas(filtered);
        }

        function resetSearch() {
            currentCategory = 'all';
            currentSearch = '';
            document.getElementById('searchInput').value = '';
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.dataset.category === 'all') btn.classList.add('active');
            });
            filterIdeas();
        }

        // イベントリスナー
        document.getElementById('categoryFilters').addEventListener('click', (e) => {
            const btn = e.target.closest('.category-btn');
            if (btn) {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                filterIdeas();
            }
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            filterIdeas();
        });

        // モーダルロジック (詳細モーダル)
        function openModal(idea) {
            const modal = document.getElementById('detailModal');
            if(modal) {
                // データセット
                document.getElementById('modalCategoryBadge').className = `inline-flex items-center px-3 py-1 rounded-full text-xs font-bold mb-3 ${getCategoryColor(idea.category)}`;
                document.getElementById('modalCategoryBadge').innerHTML = `<i class="fa-solid ${getCategoryIcon(idea.category)} mr-1"></i>${idea.category}`;
                document.getElementById('modalTitle').textContent = idea.title;
                document.getElementById('modalId').textContent = String(idea.id).padStart(3, '0');
                document.getElementById('modalType').textContent = idea.type;
                document.getElementById('modalTask').textContent = idea.task;
                document.getElementById('modalDetail').textContent = idea.detail;

                // ストックボタンの状態更新
                const stockBtn = document.getElementById('modalStockBtn');
                if (stockBtn) {
                    if (stockedIdeas.includes(idea.id)) {
                        stockBtn.innerHTML = '<i class="fa-solid fa-heart"></i> ストック済み';
                        stockBtn.className = "w-full sm:w-auto bg-pink-500 text-white font-bold py-3 sm:py-2 px-8 rounded-full transition flex items-center justify-center gap-2 hover:bg-pink-600";
                    } else {
                        stockBtn.innerHTML = '<i class="fa-regular fa-heart"></i> ストックする';
                        stockBtn.className = "w-full sm:w-auto border-2 border-pink-400 text-pink-500 hover:bg-pink-50 font-bold py-3 sm:py-2 px-8 rounded-full transition flex items-center justify-center gap-2";
                    }
                }

                modal.classList.remove('hidden');
            }
        }

        function closeDetailModal() {
            const modal = document.getElementById('detailModal');
            if(modal) modal.classList.add('hidden');
        }
        
        // closeDetailModal へのエイリアス
        function closeModal() {
            closeDetailModal();
        }
        
        function showRandomIdea() {
            const randomIndex = Math.floor(Math.random() * ideas.length);
            openModal(ideas[randomIndex]);
        }

        // 初期化
        updateStockUI();
        renderIdeas(ideas);

    </script>
</body>
</html>
